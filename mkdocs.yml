site_name: Lowlands Tactical Kennisbank
site_url: https://lowlands-tactical.github.io/LT-Wiki/
repo_url: https://github.com/Lowlands-Tactical/LT-Wiki/
theme:
  name: material
  logo: img/lt_logo.png
  favicon: img/favicon.ico
  language: nl 
  features:
    - content.code.annotate
    - content.tooltips
    - navigation.top
    - navigation.collapse
    - navigation.instant
    - content.tabs.link
    - search.highlight
    - icons
    - search.suggest
    - search.share
    - navigation.footer
  palette:
    scheme: slate
    primary: black
    accent: orange

nav:
  - Home: index.md
  - 1. Algemene Informatie:
    - 1.1. Introductie: 1_algemene_informatie/1_1_introductie.md
    - 1.2. Modset Installeren: 1_algemene_informatie/1_2_modset_installeren.md
    - 1.3. Toetsinstellingen: 1_algemene_informatie/1_3_toetsinstellingen.md
    - 1.4. Troubleshooting: 1_algemene_informatie/1_4_troubleshooting.md
    - 1.5. Mediabeleid: 1_algemene_informatie/1_5_mediabeleid.md
  - 2. Basisvaardigheden:
    - 2.1. Gevechtsorde: 2_basisvaardigheden/2_1_gevechtsorde.md
    - 2.2. Reageren op contact: 2_basisvaardigheden/2_2_reageren_op_contact.md
    - 2.3. Uitroepen van contact: 2_basisvaardigheden/2_3_uitroepen_van_contact.md
    - 2.4. Communicatie: 2_basisvaardigheden/2_4_communicatie.md
    - 2.5. Situational awareness: 2_basisvaardigheden/2_5_situational_awareness.md
    - 2.6. Basis EHBO: 2_basisvaardigheden/2_6_basis_ehbo.md
    - 2.7. Navigeren: 2_basisvaardigheden/2_7_navigeren.md
    - 2.8. Optreden Verstedelijkt Gebied: 2_basisvaardigheden/2_8_optreden_verstedelijkt_gebied.md
  - 3. Vuurteam Rollen:
    - 3.1. Autorifleman: 3_vuurteam_rollen/3_1_autorifleman.md
    - 3.2. Grenadier: 3_vuurteam_rollen/3_2_grenadier.md
    - 3.3. Anti Tank: 3_vuurteam_rollen/3_3_anti_tank.md
    - 3.4. Medic: 3_vuurteam_rollen/3_4_medic.md
  - 4. Voertuigen:
    - 4.1. Voertuigen: 4_voertuigen/4_1_voertuigen.md
    - 4.2. Fastrope: 4_voertuigen/4_2_fastrope.md
    - 4.3. Paradrop: 4_voertuigen/4_3_paradrop.md
    - 4.4. Heli Pilot: 4_voertuigen/4_4_heli_pilot.md
    - 4.5. Jet Pilot: 4_voertuigen/4_5_jet_pilot.md
  - 5. Speciale Rollen:
    - 5.1. EOD: 5_speciale_rollen/5_1_eod.md
    - 5.2. J-TAC: 5_speciale_rollen/5_2_j_tac.md
    - 5.3. Sniper: 5_speciale_rollen/5_3_sniper.md
    - 5.4. Mortier: 5_speciale_rollen/5_4_mortier.md
  - 6. Leiding:
    - 6.1. Pelotonscommandant: 6_leiding/6_1_pc.md
    - 6.2. Groepscommandant: 6_leiding/6_2_gc.md
    - 6.3. Vuurteamleider: 6_leiding/6_3_vtl.md
    - 6.4. Map Marker Setter: 6_leiding/6_4_ms.md
  - 7. Missiemakers:
    - 7.1. Zelf missie maken?: 7_missiemakers/7_1_zelf_missie_maken.md
    - 7.2. Missiemaker repo: 7_missiemakers/7_2_missiemaker_repo.md
    - 7.3. Scenario eisen: 7_missiemakers/7_3_scenario_eisen.md
    - 7.4. Tips en Tricks: 7_missiemakers/7_4_tips_en_tricks.md
    - 7.5. Missiebriefings: 7_missiemakers/7_5_missiebriefings.md

extra_css:
  - 'custom.css'

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.critic
  - pymdownx.inlinehilite
  - pymdownx.blocks.caption
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra:
  generator: false
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/WU9CydUm5G
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/channel/UCptY-I7KVhC1eyxGAswhFNg
    - icon: fontawesome/brands/instagram
      link: https://www.instagram.com/lowtacnl/
    - icon: fontawesome/brands/bluesky
      link: https://bsky.app/profile/lowlandstactical.bsky.social
    - icon: fontawesome/brands/github
      link: https://github.com/Lowlands-Tactical

copyright: Copyright &copy; 2025 Lowlands Tactical