[project]
site_name = "Lowlands Tactical Kennisbank"
site_description = "De officiële kennisbank van Lowlands Tactical — tactische documentatie voor Arma 3 sessies."
site_url = "https://lowlands-tactical.github.io/LT-Wiki/"
repo_url = "https://github.com/Lowlands-Tactical/LT-Wiki/"
copyright = "Copyright &copy; 2026 Lowlands Tactical"

extra_css = ["custom.css"]

nav = [
  {"Home" = "index.md"},
  {"Algemene Informatie" = [
    "1_algemene_informatie/index.md",
    {"Introductie" = "1_algemene_informatie/1_1_introductie.md"},
    {"Modset Installeren" = "1_algemene_informatie/1_2_modset_installeren.md"},
    {"Toetsinstellingen" = "1_algemene_informatie/1_3_toetsinstellingen.md"},
    {"Troubleshooting" = "1_algemene_informatie/1_4_troubleshooting.md"},
    {"Mediabeleid" = "1_algemene_informatie/1_5_mediabeleid.md"},
  ]},
  {"Basisvaardigheden" = [
    "2_basisvaardigheden/index.md",
    {"Gevechtsorde" = "2_basisvaardigheden/2_1_gevechtsorde.md"},
    {"Reageren op contact" = "2_basisvaardigheden/2_2_reageren_op_contact.md"},
    {"Uitroepen van contact" = "2_basisvaardigheden/2_3_uitroepen_van_contact.md"},
    {"Communicatie" = "2_basisvaardigheden/2_4_communicatie.md"},
    {"Situational awareness" = "2_basisvaardigheden/2_5_situational_awareness.md"},
    {"Basis EHBO" = "2_basisvaardigheden/2_6_basis_ehbo.md"},
    {"Navigeren" = "2_basisvaardigheden/2_7_navigeren.md"},
    {"Optreden Verstedelijkt Gebied" = "2_basisvaardigheden/2_8_optreden_verstedelijkt_gebied.md"},
  ]},
  {"Vuurteam Rollen" = [
    "3_vuurteam_rollen/index.md",
    {"Autorifleman" = "3_vuurteam_rollen/3_1_autorifleman.md"},
    {"Grenadier" = "3_vuurteam_rollen/3_2_grenadier.md"},
    {"Anti Tank" = "3_vuurteam_rollen/3_3_anti_tank.md"},
    {"Medic" = "3_vuurteam_rollen/3_4_medic.md"},
  ]},
  {"Voertuigen" = [
    "4_voertuigen/index.md",
    {"Voertuigen" = "4_voertuigen/4_1_voertuigen.md"},
    {"Fastrope" = "4_voertuigen/4_2_fastrope.md"},
    {"Paradrop" = "4_voertuigen/4_3_paradrop.md"},
    {"Heli Pilot" = "4_voertuigen/4_4_heli_pilot.md"},
    {"Jet Pilot" = "4_voertuigen/4_5_jet_pilot.md"},
  ]},
  {"Speciale Rollen" = [
    "5_speciale_rollen/index.md",
    {"EOD" = "5_speciale_rollen/5_1_eod.md"},
    {"J-TAC" = "5_speciale_rollen/5_2_j_tac.md"},
    {"Sniper" = "5_speciale_rollen/5_3_sniper.md"},
    {"Mortier" = "5_speciale_rollen/5_4_mortier.md"},
  ]},
  {"Leiding" = [
    "6_leiding/index.md",
    {"Pelotonscommandant" = "6_leiding/6_1_pc.md"},
    {"Groepscommandant" = "6_leiding/6_2_gc.md"},
    {"Vuurteamleider" = "6_leiding/6_3_vtl.md"},
    {"Map Marker Setter" = "6_leiding/6_4_ms.md"},
